@if (dialog.state(); as state) {
  <div class="dialog-backdrop" (click)="onCancel()"></div>
  <div class="dialog" [class.dialog--destructive]="state.options.destructive">
    <div class="dialog__header">
      <h2 class="dialog__title">{{ state.options.title }}</h2>
    </div>
    <div class="dialog__body">
      <p>{{ state.options.message }}</p>
    </div>
    <div class="dialog__footer">
      <button
        type="button"
        class="dialog__button dialog__button--cancel"
        (click)="onCancel()"
      >
        {{ state.options.cancelText || 'Otkaži' }}
      </button>
      <button
        type="button"
        class="dialog__button dialog__button--confirm"
        [class.dialog__button--destructive]="state.options.destructive"
        (click)="onConfirm()"
      >
        {{ state.options.confirmText || 'Potvrdi' }}
      </button>
    </div>
  </div>
}
